<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{

background:#0f172a;

color:white;

}

.card{

background:#1e293b;

border:none;

border-radius:18px;

margin-top:40px;

}

body{

background:#0f172a;

font-family:Poppins,sans-serif;

color:white;

}

.settings-container{

display:flex;

justify-content:center;

align-items:center;

padding:60px;

}

.settings-card{

width:700px;

background:#1e293b;

padding:35px;

border-radius:20px;

box-shadow:0 20px 45px rgba(0,0,0,.35);

}

.settings-card h2{

margin-bottom:30px;

font-weight:700;

color:white;

}

.setting-item{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px;

margin-bottom:18px;

background:#111827;

border-radius:15px;

}

.setting-item h5{

margin:0;

font-size:18px;

color:white;

}

.setting-item p{

margin:4px 0 0;

font-size:14px;

color:#94a3b8;

}

.form-check-input{

width:55px;

height:28px;

cursor:pointer;

background:#475569;

border:none;

}

.form-check-input:checked{

background:#2563eb;

}

.btn{

padding:14px;

font-weight:600;

border-radius:12px;

}

</style>

</head>

<body>

<div class="settings-container">

    <div class="settings-card">

        <h2>
            <i class="bi bi-gear-fill"></i>
            Account Settings
        </h2>

        <div class="setting-item">

            <div>
                <h5>Dark Mode</h5>
                <p>Enable dark interface</p>
            </div>

            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" checked>
            </div>

        </div>

        <div class="setting-item">

            <div>
                <h5>Email Notifications</h5>
                <p>Receive investigation alerts</p>
            </div>

            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" checked>
            </div>

        </div>

        <div class="setting-item">

            <div>
                <h5>Auto Generate PDF</h5>
                <p>Create report after investigation</p>
            </div>

            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" checked>
            </div>

        </div>

        <hr>

        <a href="#" class="btn btn-warning w-100 mb-3">
            <i class="bi bi-key-fill"></i>
            Change Password
        </a>

        <a href="#" class="btn btn-danger w-100 mb-3">
            <i class="bi bi-trash-fill"></i>
            Delete Account
        </a>

        <a href="/dashboard" class="btn btn-primary w-100">
            <i class="bi bi-arrow-left"></i>
            Back Dashboard
        </a>

    </div>

</div>

</body>

</html>
