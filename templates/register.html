<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Segoe UI;
        }

        .card{
            width:450px;
            border:none;
            border-radius:18px;
            box-shadow:0 20px 45px rgba(0,0,0,.45);
        }

        .logo{
            font-size:30px;
            font-weight:bold;
            color:#0d6efd;
        }

    </style>

</head>

<body>

<div class="card p-4">

<div class="text-center mb-4">

<div class="logo">

🛡 Photo Forensics

</div>

<p class="text-muted">

Create your account

</p>

</div>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button class="btn btn-primary w-100">

Create Account

</button>

<div class="text-center mt-3">

Already have an account?

<a href="/">Login</a>

</div>

</form>

</div>

</body>

</html>
